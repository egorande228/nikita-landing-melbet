<svg xmlns="http://www.w3.org/2000/svg" width="620" height="182" viewBox="0 0 620 182" role="img" aria-label="MelBet Partnerships">
  <rect width="620" height="182" fill="none"/>
  <defs>
    <filter id="mel-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0.6" dy="0.9" stdDeviation="1.2" flood-color="#f6bd06" flood-opacity="0.35"/>
    </filter>
  </defs>

  <g transform="translate(22,84) skewX(-12)">
    <text x="0" y="0" fill="#ffffff" filter="url(#mel-shadow)" font-family="Arial Black, Arial, sans-serif" font-size="104" font-style="italic" font-weight="900" letter-spacing="1">MEL</text>
    <text x="250" y="0" fill="#f6bd06" font-family="Arial Black, Arial, sans-serif" font-size="104" font-style="italic" font-weight="900" letter-spacing="1">BET</text>
  </g>

  <g transform="translate(122,103)">
    <polygon points="0,36 22,0 78,0 56,36" fill="#f6bd06"/>
    <polygon points="60,36 82,0 138,0 116,36" fill="#f6bd06"/>
    <polygon points="120,36 142,0 198,0 176,36" fill="#f6bd06"/>
  </g>

  <g transform="translate(300,103)">
    <polygon points="0,36 22,0 316,0 294,36" fill="#090909"/>
    <text x="160" y="27" fill="#ffffff" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-size="30" font-style="italic" font-weight="900" letter-spacing="2.2">PARTNERSHIPS</text>
  </g>
</svg>
